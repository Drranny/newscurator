<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>비밀번호 초기화</title>
  <style>
    .error { color: #c00; margin: 1rem 0; }
    .info  { color: #080; margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>비밀번호 초기화</h1>

  <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>
  <div th:if="${message}"  class="info"  th:text="${message}"></div>

  <form th:action="@{/auth/resetpw}"
        th:object="${passwordResetRequest}"
        method="post">
    <label>아이디:<br/>
      <input type="text" th:field="*{userId}" placeholder="가입하신 아이디" required/>
    </label><br/>
    <label>이메일:<br/>
      <input type="email" th:field="*{email}" placeholder="가입하신 이메일" required/>
    </label><br/><br/>
    <button type="submit">초기화 요청</button>
  </form>
</body>
</html>
