<!-- templates/resetpw.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 초기화</title>
</head>
<body>
  <h1>비밀번호 초기화</h1>
  <form id="resetForm">
    <label>아이디: <input type="text" name="userId" required /></label><br/>
    <label>이메일: <input type="email" name="email" required /></label><br/>
    <button type="submit">임시 비밀번호 발급</button>
  </form>
  <div id="message"></div>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const f = e.target;
      const data = { userId: f.userId.value, email: f.email.value };
      const res = await fetch('/auth/resetpw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      const div = document.getElementById('message');
      if (res.ok) {
        div.innerHTML = `<p>${json.message}</p><p><a href="${json.loginUrl}">로그인 페이지로 이동</a></p>`;
      } else {
        div.textContent = json.error;
      }
    });
  </script>
</body>
</html>
