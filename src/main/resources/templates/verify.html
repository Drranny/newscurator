<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>이메일 인증</title>
  <style>
    .error { color: #c00; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>이메일 인증</h1>

  <!-- FlashAttribute errorMsg -->
  <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>

  <form th:action="@{/auth/verify}" method="post">
    <label>
      아이디<br/>
      <input type="text"
             name="userId"
             placeholder="가입하신 아이디"
             th:value="${userId}"  <!-- 재전송된 userId 유지 -->
             required/>
    </label><br/>
    <label>
      인증 코드<br/>
      <input type="text"
             name="code"
             placeholder="이메일로 받은 코드"
             required/>
    </label><br/>
    <button type="submit">인증 완료</button>
  </form>

  <p>
    인증 코드가 없으신가요?
    <a th:href="@{/auth/verify/resend(userId=${userId})}">인증 코드 재전송</a>
  </p>
</body>
</html>
