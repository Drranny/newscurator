<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이메일 인증</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    h1, h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 24px;
    }

    h2 {
      font-size: 20px;
      margin-top: 40px;
    }

    .error {
      color: #dc3545;
      background: #f8d7da;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #4a90e2;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #357abd;
    }

    .resend-form {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #eee;
    }

    .resend-form p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #4a90e2;
    }

    :root {
      --primary-color: #0ABAB5;
      --primary-hover: #099c98;
      --text-color: #f7f7f7;
      --text-secondary: #a0a0a0;
      --bg-color: #000000;
      --bg-secondary: #1a1a1a;
      --bg-card: #222222;
      --bg-dark: #111111;
      --border-color: #333333;
      --success-color: #28a745;
      --warning-color: #ffc107;
      --danger-color: #dc3545;
      --info-color: #17a2b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>이메일 인증</h1>

    <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>

    <form th:action="@{/auth/verify}" method="post">
      <div class="form-group">
        <label>아이디</label>
        <input type="text"
               name="userId"
               placeholder="가입하신 아이디"
               th:value="${userId}"
               required/>
      </div>
      <div class="form-group">
        <label>인증 코드</label>
        <input type="text"
               name="code"
               placeholder="이메일로 받은 코드"
               required/>
      </div>
      <button type="submit">인증 완료</button>
    </form>

    <div class="resend-form">
      <h2>인증 코드 재전송</h2>
      <p>아이디(또는 이메일)를 입력하시면, 해당 계정으로 인증 코드를 다시 보냅니다.</p>
      <form th:action="@{/auth/verify/resend}" method="get">
        <div class="form-group">
          <label>아이디</label>
          <input type="text"
                 name="userId"
                 placeholder="가입하신 아이디"
                 required/>
        </div>
        <button type="submit">인증 코드 재전송</button>
      </form>
    </div>

    <a href="/" class="back-link">← 메인으로 돌아가기</a>
  </div>
</body>
</html>
