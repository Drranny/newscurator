<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원탈퇴</title>
  <style>
    .error { color: #c00; margin: 1rem 0; }
    .info  { color: #080; margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>회원탈퇴</h1>

  <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>
  <div th:if="${message}"  class="info"  th:text="${message}"></div>

  <form th:action="@{/auth/delete}" method="post">
    <!-- DELETE 폼은 일반 브라우저에서 지원되지 않으므로 _method 필드 사용 -->
    <input type="hidden" name="_method" value="delete"/>

    <label>아이디:
      <input type="text" name="userId" required/>
    </label><br/>
    <label>비밀번호:
      <input type="password" name="password" required/>
    </label><br/>
    <button type="submit">탈퇴하기</button>
  </form>
</body>
</html>
