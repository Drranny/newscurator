<!-- templates/delete.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원탈퇴</title>
</head>
<body>
  <h1>회원탈퇴</h1>
  <form id="deleteForm">
    <label>아이디: <input type="text" name="userId" required /></label><br/>
    <label>비밀번호: <input type="password" name="password" required /></label><br/>
    <button type="submit">탈퇴하기</button>
  </form>
  <div id="message"></div>
  <script>
    document.getElementById('deleteForm').addEventListener('submit', async e => {
      e.preventDefault();
      const f = e.target;
      const data = { userId: f.userId.value, password: f.password.value };
      const res = await fetch('/auth/delete', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      document.getElementById('message').textContent = json.message || json.error;
    });
  </script>
</body>
</html>
