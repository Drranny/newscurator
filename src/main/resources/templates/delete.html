<form th:action="@{/auth/delete}" th:object="${loginRequest}" method="post">
  <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>
  <label>아이디: <input type="text" th:field="*{userId}" required/></label><br/>
  <label>비밀번호: <input type="password" th:field="*{password}" required/></label><br/>
  <button type="submit">회원탈퇴</button>
</form>
