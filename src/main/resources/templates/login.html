<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <style>
    .error { color: #c00; margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>로그인</h1>

  <!-- FlashAttribute errorMsg -->
  <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>

  <form th:action="@{/auth/login}" method="post">
    <label>아이디:
      <input type="text" name="userId" required/>
    </label><br/>
    <label>비밀번호:
      <input type="password" name="password" required/>
    </label><br/>
    <button type="submit">로그인</button>
  </form>

  <nav>
    <a th:href="@{/auth/changepw}">비밀번호 변경</a> |
    <a th:href="@{/auth/resetpw}">비밀번호 초기화</a> |
    <a th:href="@{/auth/signup}">회원가입</a> |
    <a th:href="@{/auth/delete}">회원탈퇴</a>
  </nav>

  <div>
    <button onclick="location.href='/oauth2/authorization/google'">Google 로그인</button>
    <button onclick="location.href='/oauth2/authorization/kakao'">Kakao 로그인</button>
  </div>
</body>
</html>
