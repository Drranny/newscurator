<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
</head>
<body>
  <h1>로그인</h1>
  <form id="loginForm">
    <label>아이디: <input type="text" name="userId" required></label>
    <label>비밀번호: <input type="password" name="password" required></label>
    <button type="submit">로그인</button>
  </form>
  <nav>
    <a href="/auth/changepw">비밀번호 변경</a> |
    <a href="/auth/resetpw">비밀번호 초기화</a> |
    <a href="/auth/signup">회원가입</a> |
    <a href="/auth/delete">회원탈퇴</a>
  </nav>
  <div>
    <button onclick="location.href='/oauth2/authorization/google'">Google 로그인</button>
    <button onclick="location.href='/oauth2/authorization/kakao'">Kakao 로그인</button>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        // 로그인 성공 시 홈으로 이동
        window.location.href = '/';
      } else {
        const json = await res.json();
        alert(json.error);
      }
    });
  </script>
</body>
</html>
