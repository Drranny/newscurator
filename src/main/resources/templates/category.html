<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category} + ' 뉴스 - 뉴스 큐레이션'">카테고리 뉴스 - 뉴스 큐레이션</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root {
            --primary-color: #1976d2;
            --primary-hover: #125ea2;
            --text-color: #f7f7f7;
            --text-secondary: #a0a0a0;
            --bg-color: #000000;
            --bg-secondary: #1a1a1a;
            --bg-card: #222222;
            --bg-dark: #111111;
            --border-color: #333333;
            --slider-bg: linear-gradient(135deg, #2a3140 0%, #2d3a5a 60%, #3a5a8c 100%);
            --stats-bg: linear-gradient(135deg, #2a3140 0%, #2d3a5a 60%, #3a5a8c 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .full-width {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* 네비게이션 스타일 */
        .top-nav {
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 4rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .menu-button {
            padding: 0.75rem;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
        }

        .menu-button:hover {
            color: var(--text-color);
        }

        .main-nav {
            display: flex;
            margin-left: 1.5rem;
        }

        .nav-brand {
            font-weight: bold;
            padding: 0.75rem;
            color: var(--text-color);
            text-decoration: none;
        }

        .category-menu {
            display: flex;
            gap: 2rem;
            margin-left: 1rem;
        }

        .category-item {
            padding: 0.75rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .category-item:hover, .category-item.active {
            color: var(--text-color);
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .icon-button {
            padding: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .icon-button:hover {
            color: var(--text-color);
        }

        .divider {
            color: #444444;
            margin: 0 0.25rem;
        }

        .nav-button {
            padding: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .nav-button:hover {
            color: var(--text-color);
        }

        /* 메인 컨텐츠 스타일 */
        .main-content {
            background-color: var(--bg-color);
            padding: 2rem 0 3rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .category-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .category-subtitle {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .sort-options {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .sort-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-button {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            min-width: 120px;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .dropdown-button:hover {
            background-color: var(--bg-card);
            border-color: var(--primary-color);
        }

        .dropdown-button.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--bg-secondary);
            min-width: 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            z-index: 1000;
            top: 100%;
            left: 0;
            margin-top: 0.25rem;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-item {
            color: var(--text-color);
            padding: 0.75rem 1rem;
            text-decoration: none;
            display: block;
            transition: background-color 0.2s;
            font-size: 0.9rem;
        }

        .dropdown-item:hover {
            background-color: var(--bg-card);
        }

        .dropdown-item.active {
            background-color: var(--primary-color);
            color: white;
        }

        .dropdown-item:first-child {
            border-radius: 8px 8px 0 0;
        }

        .dropdown-item:last-child {
            border-radius: 0 0 8px 8px;
        }

        /* 슬라이더 스타일 - 화면 꽉 차게 */
        .slider-hero-bg {
            width: 100vw;
            background: var(--slider-bg);
            padding: 2rem 0 1rem 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 350px;
            box-shadow: 0 8px 32px 0 rgba(25, 118, 210, 0.10);
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            margin-bottom: 4rem;
            overflow: hidden;
        }

        .slider-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .recommended-news {
            width: 100%;
            position: relative;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
            border-radius: 18px;
        }

        .slider-track {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
        }

        .slide-item {
            min-width: 100%;
            flex-shrink: 0;
            position: relative;
            border-radius: 18px;
            background: var(--bg-card);
            display: flex;
            align-items: stretch;
            height: 320px;
            overflow: hidden;
        }

        .slide-image {
            width: 60%;
            height: 100%;
            object-fit: cover;
        }

        .slide-content {
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-card);
        }

        .slide-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.4;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .slide-title a {
            color: #fff;
            text-decoration: none;
        }

        .slide-meta {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        /* 슬라이더 컨트롤 */
        .slider-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .arrow-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.9);
            border: none;
            color: #1976d2;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .arrow-button:hover {
            background-color: #fff;
            transform: scale(1.1);
        }

        .indicators {
            display: flex;
            gap: 0.5rem;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.2s;
        }

        .indicator.active {
            background-color: #fff;
        }

        /* 뉴스 섹션 타이틀 */
        .news-section {
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 1rem;
        }

        .section-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            padding-left: 1rem;
        }

        /* 뉴스 그리드 스타일 - 4열, 이미지 위 텍스트 아래 */
        .news-grid-container {
            max-width: 1200px;
            margin: 0 auto 4rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .news-item {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .news-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .news-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .news-keyword {
            background-color: rgba(25, 118, 210, 0.1);
            color: var(--primary-color);
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 1rem;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .news-title a {
            color: #fff;
            text-decoration: none;
        }

        .news-title a:hover {
            color: #aad4ff;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            margin-top: auto;
        }

        .news-source {
            background-color: rgba(25, 118, 210, 0.2);
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #1976d2;
            font-weight: 500;
        }

        /* 통계 섹션 스타일 - 파란색, 맨 아래 */
        .stats-section {
            background: var(--stats-bg);
            padding: 3rem 2rem;
            margin: 3rem auto;
            border-radius: 16px;
            color: white;
            text-align: center;
            box-shadow: 0 8px 32px rgba(25, 118, 210, 0.2);
            max-width: 900px;
        }

        .stats-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            opacity: 0.95;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            opacity: 0.9;
            font-weight: 500;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            display: block;
        }

        .stat-unit {
            font-size: 1.2rem;
            margin-left: 0.25rem;
            opacity: 0.8;
        }

        /* 더보기 버튼 스타일 */
        .load-more-container {
            display: flex;
            justify-content: center;
            margin-top: 2.5rem;
        }

        .load-more-button {
            padding: 0.75rem 2rem;
            background-color: var(--bg-secondary);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more-button:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .news-item.hidden {
            display: none;
        }

        /* 비었을 때 메시지 */
        .no-articles {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 3rem;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .no-articles i {
            font-size: 3rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .no-articles h3 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-color);
        }

        .no-articles p {
            color: var(--text-secondary);
        }

        /* 반응형 설정 */
        @media (max-width: 1200px) {
            .news-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 992px) {
            .slide-item {
                flex-direction: column;
                height: 450px;
            }
            .slide-image {
                width: 100%;
                height: 250px;
            }
            .slide-content {
                width: 100%;
                height: 200px;
                padding: 1.5rem;
            }
            .slide-title {
                font-size: 1.6rem;
            }
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stats-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        @media (max-width: 768px) {
            .stats-section {
                padding: 2rem 1rem;
            }
            .stat-number {
                font-size: 2rem;
            }
            .slider-hero-bg {
                padding: 2rem 0 1rem 0;
                min-height: 400px;
            }
            .slider-container {
                padding: 0 1rem;
            }
            .news-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .slide-title {
                font-size: 1.3rem;
            }
            .slider-hero-bg {
                min-height: 300px;
            }
            .stats-container {
                gap: 1.5rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }

        .slide-title a, .news-title a {
            text-decoration: none !important;
        }
        .news-title, .slide-title {
            border-bottom: none !important;
        }

        .news-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <!-- 상단 네비게이션 바 -->
    <nav class="top-nav">
        <div class="container">
            <div class="nav-wrapper">
                <div class="nav-left">
                    <button class="menu-button">
                        <i class="fas fa-bars"></i>
                    </button>
                    
                    <div class="main-nav">
                        <a class="nav-brand" th:href="@{/}">CuraT</a>
                        <div class="category-menu">
                            <a class="category-item" th:classappend="${category == 'AI'} ? 'active' : ''" th:href="@{/category/AI}">AI</a>
                            <a class="category-item" th:classappend="${category == '하드웨어'} ? 'active' : ''" th:href="@{/category/하드웨어}">하드웨어</a>
                            <a class="category-item" th:classappend="${category == '데이터'} ? 'active' : ''" th:href="@{/category/데이터}">데이터</a>
                            <a class="category-item" th:classappend="${category == '보안'} ? 'active' : ''" th:href="@{/category/보안}">보안</a>
                        </div>
                    </div>
                </div>
                
                <div class="nav-right">
                    <a class="icon-button" th:href="@{/analytics}">
                        <i class="fas fa-chart-bar"></i>
                    </a>
                    <span class="divider">|</span>
                    <a class="nav-button" th:href="@{/search}">검색</a>
                    <span class="divider">|</span>
                    <a class="nav-button" th:href="@{/login}">로그인</a>
                    <span class="divider">|</span>
                    <a class="nav-button" th:href="@{/user}">마이</a>
                    <span class="divider">|</span>
                    <a class="nav-button" th:href="@{/bookmark}">북마크</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 컨텐츠 영역 -->
    <main class="main-content">
        <div class="container">
            <!-- 페이지 헤더 -->
            <div class="page-header">
                <h1 class="category-title" th:text="${category} + ' 뉴스'">카테고리 뉴스</h1>
                <p class="category-subtitle" th:text="${category} + '와 관련된 최신 트렌드와 기술 뉴스'">관련된 최신 트렌드와 기술 뉴스</p>
                
                <!-- 정렬 옵션 - 드롭다운 형태 -->
                <div class="sort-options">
                    <!-- 정렬 기준 드롭다운 -->
                    <div class="sort-dropdown">
                        <button class="dropdown-button" id="sortTypeBtn">
                            <span th:text="${currentSort == 'latest' ? '최신순' : (currentSort == 'views' ? '조회수순' : (currentSort == 'title' ? '제목순' : '전체'))}">전체</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-content" id="sortTypeContent">
                            <a th:href="@{/category/{category}(category=${category}, sort='latest', direction=${currentDirection})}"
                               th:class="${currentSort == 'latest'} ? 'dropdown-item active' : 'dropdown-item'"
                               class="dropdown-item">최신순</a>
                            <a th:href="@{/category/{category}(category=${category}, sort='views', direction=${currentDirection})}"
                               th:class="${currentSort == 'views'} ? 'dropdown-item active' : 'dropdown-item'"
                               class="dropdown-item">조회수순</a>
                            <a th:href="@{/category/{category}(category=${category}, sort='title', direction=${currentDirection})}"
                               th:class="${currentSort == 'title'} ? 'dropdown-item active' : 'dropdown-item'"
                               class="dropdown-item">제목순</a>
                        </div>
                    </div>
                    
                    <!-- 정렬 방향 드롭다운 -->
                    <div class="sort-dropdown">
                        <button class="dropdown-button" id="sortDirectionBtn">
                            <span th:text="${currentDirection == 'desc' ? '내림차순' : '오름차순'}">최신순</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-content" id="sortDirectionContent">
                            <a th:href="@{/category/{category}(category=${category}, sort=${currentSort}, direction='desc')}"
                               th:class="${currentDirection == 'desc'} ? 'dropdown-item active' : 'dropdown-item'"
                               class="dropdown-item">내림차순</a>
                            <a th:href="@{/category/{category}(category=${category}, sort=${currentSort}, direction='asc')}"
                               th:class="${currentDirection == 'asc'} ? 'dropdown-item active' : 'dropdown-item'"
                               class="dropdown-item">오름차순</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 추천 뉴스 슬라이더 - 화면 꽉 차게 -->
        <div th:if="${not articles.empty}" class="slider-hero-bg">
            <div class="slider-container">
                <div class="recommended-news">
                    <div class="slider-wrapper">
                        <div class="slider-track" id="sliderTrack">
                            <div th:each="article, stat : ${articles}" th:if="${stat.index < 3}" class="slide-item">
                                <img th:src="@{/img/news{index}.jpg(index=${stat.index + 1})}" 
                                     src="/api/placeholder/500/400" 
                                     class="slide-image" 
                                     alt="News Image">
                                <div class="slide-content">
                                    <h3 class="slide-title">
                                        <a th:href="${article.url}" th:text="${article.title}">추천 뉴스 제목</a>
                                    </h3>
                                    <div class="slide-meta">
                                        <span th:text="${article.sourceName}">출처</span>
                                        <span th:text="${#temporals.format(article.publishedAt, 'yyyy-MM-dd')}">날짜</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 슬라이더 컨트롤 -->
                    <div class="slider-controls" th:if="${articles.size() > 1}">
                        <button class="arrow-button" id="prevBtn">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <div class="indicators">
                            <div class="indicator active" th:each="article, stat : ${articles}" th:if="${stat.index < 3}"
                                 th:attr="data-slide=${stat.index}"></div>
                        </div>
                        <button class="arrow-button" id="nextBtn">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <!-- 뉴스가 없을 때 -->
            <div th:if="${articles.empty}" class="no-articles">
                <i class="fas fa-newspaper"></i>
                <h3>해당 카테고리의 뉴스가 없습니다</h3>
                <p>곧 새로운 뉴스가 업데이트될 예정입니다</p>
            </div>
            
            <!-- 최신 뉴스 섹션 -->
            <div th:if="${not articles.empty}" class="news-section">
                <h2 class="section-title">최신 뉴스</h2>
                <p class="section-subtitle">가장 최근에 업데이트된 뉴스를 확인하세요</p>
                
                <div class="news-grid-container">
                    <div class="news-grid">
                        <div th:each="article, stat : ${articles}" 
                             th:class="${stat.index >= 0 and stat.index < 8} ? 'news-item' : 'news-item hidden'"
                             th:if="${stat.index < 20}">
                            <a th:href="${article.url}">
                                <img th:src="@{/img/news{index}.jpg(index=${(stat.index % 5) + 1})}" 
                                     src="/api/placeholder/300/200" 
                                     class="news-image" 
                                     alt="News Image">
                                <div class="news-content">
                                    <!-- 백엔드에서 키워드 데이터 가져오기 -->
                                    <div class="news-keywords" th:if="${article.keywords != null and not #lists.isEmpty(article.keywords)}">
                                        <span th:each="keyword : ${article.keywords}" 
                                              th:text="'#' + ${keyword}" 
                                              class="news-keyword"></span>
                                    </div>
                                    <!-- 키워드가 없을 때 기본 키워드 -->
                                    <div class="news-keywords" th:if="${article.keywords == null or #lists.isEmpty(article.keywords)}">
                                        <span class="news-keyword" th:text="'#' + ${category}"></span>
                                        <span class="news-keyword">#뉴스</span>
                                    </div>
                                    <h3 class="news-title" th:text="${article.title}">뉴스 제목</h3>
                                    <p class="news-description" th:text="${article.description}">뉴스 요약</p>
                                    <div class="news-meta">
                                        <span class="news-source" th:text="${article.sourceName}">출처</span>
                                        <span th:text="${#temporals.format(article.publishedAt, 'MM-dd')}">날짜</span>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                    
                    <!-- 더보기 버튼 -->
                    <div th:if="${articles.size() > 8}" class="load-more-container">
                        <button id="loadMoreBtn" class="load-more-button">더보기</button>
                    </div>
                </div>
            </div>

            <!-- 인기 뉴스 섹션 -->
            <div th:if="${not articles.empty and articles.size() > 8}" class="news-section">
                <h2 class="section-title">인기 뉴스</h2>
                <p class="section-subtitle">많은 관심을 받고 있는 뉴스입니다</p>
                
                <div class="news-grid-container">
                    <div class="news-grid">
                        <div th:each="article, stat : ${articles}" 
                             th:class="'news-item'"
                             th:if="${stat.index >= 8 and stat.index < 12}">
                            <a th:href="${article.url}">
                                <img th:src="@{/img/news{index}.jpg(index=${(stat.index % 5) + 1})}" 
                                     src="/api/placeholder/300/200" 
                                     class="news-image" 
                                     alt="News Image">
                                <div class="news-content">
                                    <!-- 백엔드에서 키워드 데이터 가져오기 -->
                                    <div class="news-keywords" th:if="${article.keywords != null and not #lists.isEmpty(article.keywords)}">
                                        <span th:each="keyword : ${article.keywords}" 
                                              th:text="'#' + ${keyword}" 
                                              class="news-keyword"></span>
                                    </div>
                                    <!-- 키워드가 없을 때 기본 키워드 -->
                                    <div class="news-keywords" th:if="${article.keywords == null or #lists.isEmpty(article.keywords)}">
                                        <span class="news-keyword" th:text="'#' + ${category}"></span>
                                        <span class="news-keyword">#인기</span>
                                    </div>
                                    <h3 class="news-title" th:text="${article.title}">뉴스 제목</h3>
                                    <p class="news-description" th:text="${article.description}">뉴스 요약</p>
                                    <div class="news-meta">
                                        <span class="news-source" th:text="${article.sourceName}">출처</span>
                                        <span th:text="${#temporals.format(article.publishedAt, 'MM-dd')}">날짜</span>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 통계 섹션 - 파란색, 맨 아래 -->
            <div th:if="${not articles.empty}" class="stats-section">
                <h2 class="stats-title">오늘의 뉴스 현황</h2>
                <div class="stats-container">
                    <div class="stat-item">
                        <div class="stat-label">오늘 업데이트</div>
                        <span class="stat-number" th:text="${todayArticlesCount != null ? todayArticlesCount : 5}">5</span>
                        <span class="stat-unit">개</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">총 뉴스</div>
                        <span class="stat-number" th:text="${articles.size()}">0</span>
                        <span class="stat-unit">개</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 드롭다운 기능
            function setupDropdown(buttonId, contentId) {
                const button = document.getElementById(buttonId);
                const content = document.getElementById(contentId);
                
                if (button && content) {
                    button.addEventListener('click', function(e) {
                        e.stopPropagation();
                        
                        // 다른 드롭다운 닫기
                        document.querySelectorAll('.dropdown-content').forEach(dropdown => {
                            if (dropdown !== content) {
                                dropdown.classList.remove('show');
                            }
                        });
                        
                        // 현재 드롭다운 토글
                        content.classList.toggle('show');
                    });
                }
            }
            
            setupDropdown('sortTypeBtn', 'sortTypeContent');
            setupDropdown('sortDirectionBtn', 'sortDirectionContent');
            
            // 드롭다운 외부 클릭시 닫기
            document.addEventListener('click', function() {
                document.querySelectorAll('.dropdown-content').forEach(dropdown => {
                    dropdown.classList.remove('show');
                });
            });
            
            // 이미지 로드 오류 처리
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.onerror = function() {
                    if (this.classList.contains('slide-image')) {
                        this.src = '/api/placeholder/500/400';
                    } else if (this.classList.contains('news-image')) {
                        this.src = '/api/placeholder/300/200';
                    }
                };
            });
            
            // 더보기 버튼 기능
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', function() {
                    const hiddenNews = document.querySelectorAll('.news-item.hidden');
                    
                    if (hiddenNews.length > 0) {
                        // 처음 8개씩 추가로 보여주기
                        let showCount = 0;
                        hiddenNews.forEach(item => {
                            if (showCount < 8) {
                                item.classList.remove('hidden');
                                showCount++;
                            }
                        });
                        
                        // 더 이상 숨겨진 뉴스가 없으면 버튼 텍스트 변경
                        if (document.querySelectorAll('.news-item.hidden').length === 0) {
                            loadMoreBtn.textContent = '접기';
                        }
                    } else {
                        // 처음 8개만 남기고 나머지 숨기기
                        const allNewsItems = document.querySelectorAll('.news-section:first-of-type .news-item');
                        allNewsItems.forEach((item, index) => {
                            if (index >= 8) {
                                item.classList.add('hidden');
                            }
                        });
                        loadMoreBtn.textContent = '더보기';
                    }
                });
            }
            
            // 슬라이더 기능
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const indicators = document.querySelectorAll('.indicator');
            const sliderTrack = document.getElementById('sliderTrack');
            const slideItems = document.querySelectorAll('.slide-item');
            
            if (slideItems.length > 1 && sliderTrack) {
                let currentIndex = 0;
                
                function updateSlider() {
                    const translateX = -currentIndex * 100;
                    sliderTrack.style.transform = `translateX(${translateX}%)`;
                    
                    // 인디케이터 업데이트
                    indicators.forEach((indicator, index) => {
                        if (index === currentIndex) {
                            indicator.classList.add('active');
                        } else {
                            indicator.classList.remove('active');
                        }
                    });
                }
                
                // 이전 버튼
                if (prevBtn) {
                    prevBtn.addEventListener('click', function() {
                        currentIndex = (currentIndex - 1 + slideItems.length) % slideItems.length;
                        updateSlider();
                    });
                }
                
                // 다음 버튼
                if (nextBtn) {
                    nextBtn.addEventListener('click', function() {
                        currentIndex = (currentIndex + 1) % slideItems.length;
                        updateSlider();
                    });
                }
                
                // 인디케이터 클릭
                indicators.forEach((indicator, index) => {
                    indicator.addEventListener('click', function() {
                        currentIndex = index;
                        updateSlider();
                    });
                });
                
                // 자동 슬라이드
                setInterval(() => {
                    currentIndex = (currentIndex + 1) % slideItems.length;
                    updateSlider();
                }, 5000);
            }
        });
    </script>
</body>
</html>
