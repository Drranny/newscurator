<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 24px;
    }

    .error {
      color: #dc3545;
      background: #f8d7da;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .info {
      color: #155724;
      background: #d4edda;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #4a90e2;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #357abd;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #4a90e2;
    }

    :root {
      --primary-color: #0ABAB5;
      --primary-hover: #099c98;
      --text-color: #f7f7f7;
      --text-secondary: #a0a0a0;
      --bg-color: #000000;
      --bg-secondary: #1a1a1a;
      --bg-card: #222222;
      --bg-dark: #111111;
      --border-color: #333333;
      --success-color: #28a745;
      --warning-color: #ffc107;
      --danger-color: #dc3545;
      --info-color: #17a2b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>비밀번호 변경</h1>

    <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>
    <div th:if="${message}" class="info" th:text="${message}"></div>

    <form th:action="@{/auth/changepw}" th:object="${passwordChangeRequest}" method="post">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" th:field="*{userId}" required/>
      </div>
      <div class="form-group">
        <label>기존 비밀번호</label>
        <input type="password" th:field="*{oldPassword}" required/>
      </div>
      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" th:field="*{newPassword}" required/>
      </div>
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" th:field="*{confirmPassword}" required/>
      </div>
      <button type="submit">변경하기</button>
    </form>

    <a href="/" class="back-link">← 메인으로 돌아가기</a>
  </div>
</body>
</html>
